[tool:pytest]
minversion = 7.0
addopts = 
    -ra 
    -q 
    --strict-markers 
    --strict-config
    --tb=short
    --cov=ai_brain_python
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=95
testpaths = tests
asyncio_mode = auto
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    performance: Performance and benchmark tests
    slow: Slow running tests (skipped by default)
    
    # Framework-specific markers
    crewai: CrewAI framework integration tests
    pydantic_ai: Pydantic AI framework integration tests
    agno: Agno framework integration tests
    langchain: LangChain framework integration tests
    langgraph: LangGraph framework integration tests
    
    # Cognitive system markers
    emotional_intelligence: Emotional Intelligence Engine tests
    goal_hierarchy: Goal Hierarchy Manager tests
    confidence_tracking: Confidence Tracking Engine tests
    attention_management: Attention Management System tests
    cultural_knowledge: Cultural Knowledge Engine tests
    skill_capability: Skill Capability Manager tests
    communication_protocol: Communication Protocol Manager tests
    temporal_planning: Temporal Planning Engine tests
    semantic_memory: Semantic Memory Engine tests
    safety_guardrails: Safety Guardrails Engine tests
    self_improvement: Self-Improvement Engine tests
    monitoring: Real-time Monitoring Engine tests
    tool_interface: Advanced Tool Interface tests
    workflow_orchestration: Workflow Orchestration Engine tests
    multimodal_processing: Multi-Modal Processing Engine tests
    human_feedback: Human Feedback Integration Engine tests
    
    # Infrastructure markers
    mongodb: MongoDB integration tests
    redis: Redis integration tests
    async_tests: Async/await pattern tests
    
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:motor.*
    ignore::UserWarning:pymongo.*

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for async tests (in seconds)
timeout = 300

# Parallel execution settings
# Uncomment to enable parallel test execution
# addopts = -n auto
