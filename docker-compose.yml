version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ai_brain_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ai_brain_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - ai_brain_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: ai_brain_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - ai_brain_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: MongoDB Express for database management
  mongo-express:
    image: mongo-express:1.0.0
    container_name: ai_brain_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://root:password@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ai_brain_network
    profiles:
      - tools

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ai_brain_redis_commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai_brain_network
    profiles:
      - tools

  # AI Brain Python Development Container
  ai-brain-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai_brain_python_dev
    restart: unless-stopped
    volumes:
      - .:/workspace
      - ai_brain_cache:/workspace/.cache
    environment:
      MONGODB_URL: mongodb://root:password@mongodb:27017/ai_brain_dev?authSource=admin
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /workspace
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai_brain_network
    profiles:
      - dev
    command: tail -f /dev/null  # Keep container running

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  ai_brain_cache:
    driver: local

networks:
  ai_brain_network:
    driver: bridge
